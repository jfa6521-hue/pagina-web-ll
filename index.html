```css
<style>

/* ============================= */
/* 🔥 VARIABLES MEJORADAS */
/* ============================= */
:root{
 --bg:#04070a;
 --surface:#0b0f17;

/* 🚨 ERROR ARREGLADO (tenías espacio en -- border) */
 --border:#1a2233;

 --accent:#00e0ff;
 --accent2:#f59e0b;

 --green:#00ff9c;
 --red:#ff3b3b;

 --text:#d9fdf3;
 --muted:#3c4a5f;

 --mono:'IBM Plex Mono',monospace;
 --head:'Syne',sans-serif;

/* 🔥 EFECTOS NUEVOS */
 --glow:0 0 8px rgba(0,255,156,0.4);
 --glow-blue:0 0 10px rgba(0,224,255,0.4);
}

/* ============================= */
/* 🔥 FONDO MÁS PRO (IMPORTANTE) */
/* ============================= */
body{
  background: radial-gradient(circle at top, #0a0f1a, #020407 70%);
  color:var(--text);
  font-family:var(--mono);
  min-height:100vh;
}

/* ============================= */
/* 🔥 EFECTO TEMPERATURA (AQUÍ VA) */
/* ============================= */
#val-temp{
  text-shadow: var(--glow-blue);
}

/* ============================= */
/* 🔥 EFECTO BATERÍA */
/* ============================= */
.bat-pct{
  text-shadow: var(--glow);
}

/* ============================= */
/* RESTO DE TU CSS ORIGINAL */
/* ============================= */

*{box-sizing:border-box;margin:0;padding:0}

/* TOPBAR */
.topbar{display:flex;justify-content:space-between;align-items:center;padding:16px 28px;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:10}
.brand{font-family:var(--head);font-weight:800;font-size:16px;color:var(--accent);letter-spacing:.04em}
.topbar-r{display:flex;align-items:center;gap:18px}
.nav-a{font-size:11px;color:var(--muted);text-decoration:none;letter-spacing:.1em;text-transform:uppercase;transition:color .2s}
.nav-a:hover,.nav-a.active{color:var(--accent)}
.pill{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--muted);background:var(--bg);border:1px solid var(--border);border-radius:999px;padding:5px 12px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--muted);transition:background .3s;flex-shrink:0}

/* 🔥 MEJORA VISUAL LED */
.dot.on{background:var(--green);box-shadow:0 0 8px var(--green)}
.dot.off{background:var(--red)}
.dot.wait{background:var(--accent2);animation:blink 1s infinite}

@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* ============================= */
/* 🔥 CARDS MÁS PRO */
/* ============================= */
.card{
  background: linear-gradient(145deg,#0b0f17,#05080c);
  border:1px solid var(--border);
  border-radius:12px;
  padding:22px;
  position:relative;
  overflow:hidden;
  transition:all .25s ease;
}

/* 🔥 HOVER PRO */
.card:hover{
  border-color:var(--accent);
  box-shadow:0 0 12px rgba(0,224,255,0.15);
}

.card.pulse{border-color:var(--accent)}
.card.pulse::after{
  content:'';
  position:absolute;
  top:0;
  left:-100%;
  width:60%;
  height:2px;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);
  animation:scan .5s ease-out forwards;
}

@keyframes scan{from{left:-60%}to{left:150%}}

.lbl{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.big{font-family:var(--head);font-size:54px;font-weight:800;line-height:1;color:var(--text)}
.unit{font-size:16px;color:var(--muted);margin-left:2px}

/* (EL RESTO LO DEJAS IGUAL) */

</style>
