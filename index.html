```html
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Monitor · Usuario</title>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Syne:wght@400;700;800&display=swap" rel="stylesheet"/>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<style>

/* ===================================================== */
/* 🔥 VARIABLES PROFESIONALES (ARREGLADAS Y MEJORADAS) */
/* ===================================================== */
:root{
 --bg:#04070a;
 --surface:#0b0f17;
 --border:#1a2233;

 --accent:#00e0ff;
 --accent2:#f59e0b;

 --green:#00ff9c;
 --red:#ff3b3b;

 --text:#d9fdf3;
 --muted:#3c4a5f;

 --mono:'IBM Plex Mono',monospace;
 --head:'Syne',sans-serif;

 /* 🔥 EFECTOS */
 --glow:0 0 8px rgba(0,255,156,0.4);
 --glow-blue:0 0 10px rgba(0,224,255,0.4);
}

/* ===================================================== */
/* 🔥 FONDO PRO (CAMBIO IMPORTANTE) */
/* ===================================================== */
*{box-sizing:border-box;margin:0;padding:0}

body{
  background: radial-gradient(circle at top, #0a0f1a, #020407 70%);
  color:var(--text);
  font-family:var(--mono);
  min-height:100vh;
}

/* ===================================================== */
/* 🔥 EFECTOS VISUALES CLAVE */
/* ===================================================== */

/* 🌡️ Temperatura con glow */
#val-temp{
  text-shadow: var(--glow-blue);
}

/* 🔋 Batería con glow */
.bat-pct{
  text-shadow: var(--glow);
}

/* 🟢 LED mejorado */
.dot.on{
  background:var(--green);
  box-shadow:0 0 8px var(--green);
}

/* ===================================================== */
/* TOPBAR */
/* ===================================================== */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px 28px;
  border-bottom:1px solid var(--border);
  background:var(--surface);
  position:sticky;
  top:0;
  z-index:10;
}

.brand{
  font-family:var(--head);
  font-weight:800;
  font-size:16px;
  color:var(--accent);
}

.topbar-r{
  display:flex;
  align-items:center;
  gap:18px;
}

.nav-a{
  font-size:11px;
  color:var(--muted);
  text-decoration:none;
}

.nav-a:hover,
.nav-a.active{
  color:var(--accent);
}

.pill{
  display:flex;
  align-items:center;
  gap:7px;
  font-size:11px;
  background:var(--bg);
  border:1px solid var(--border);
  border-radius:999px;
  padding:5px 12px;
}

.dot{
  width:8px;
  height:8px;
  border-radius:50%;
  background:var(--muted);
}

.dot.off{background:var(--red);}
.dot.wait{background:var(--accent2);animation:blink 1s infinite;}

@keyframes blink{
  0%,100%{opacity:1}
  50%{opacity:.2}
}

/* ===================================================== */
/* LAYOUT */
/* ===================================================== */
.page{
  max-width:960px;
  margin:0 auto;
  padding:28px 20px 60px;
}

.sec-title{
  font-family:var(--head);
  font-size:10px;
  text-transform:uppercase;
  color:var(--muted);
  margin-bottom:14px;
  border-bottom:1px solid var(--border);
  padding-bottom:8px;
}

.row{
  display:grid;
  gap:14px;
  margin-bottom:28px;
}

.row-2{
  grid-template-columns:1fr 1fr;
}

@media(max-width:600px){
  .row-2{grid-template-columns:1fr}
}

/* ===================================================== */
/* 🔥 CARDS PRO */
/* ===================================================== */
.card{
  background:linear-gradient(145deg,#0b0f17,#05080c);
  border:1px solid var(--border);
  border-radius:12px;
  padding:22px;
  position:relative;
  transition:all .25s ease;
}

.card:hover{
  border-color:var(--accent);
  box-shadow:0 0 12px rgba(0,224,255,0.15);
}

/* efecto scan */
.card.pulse::after{
  content:'';
  position:absolute;
  top:0;
  left:-100%;
  width:60%;
  height:2px;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);
  animation:scan .5s ease-out forwards;
}

@keyframes scan{
  from{left:-60%}
  to{left:150%}
}

.lbl{
  font-size:10px;
  text-transform:uppercase;
  color:var(--muted);
  margin-bottom:10px;
}

.big{
  font-family:var(--head);
  font-size:54px;
  font-weight:800;
}

.unit{
  font-size:16px;
  color:var(--muted);
}

/* ===================================================== */
/* BATERÍA */
/* ===================================================== */
.bat-wrap{
  display:flex;
  align-items:center;
  gap:18px;
}

.bat-pct{
  font-family:var(--head);
  font-size:46px;
}

.bat-bar-bg{
  width:100%;
  height:8px;
  background:var(--border);
  border-radius:999px;
  margin-top:14px;
}

.bat-bar{
  height:100%;
  background:var(--green);
  border-radius:999px;
}

/* ===================================================== */
/* NFC */
/* ===================================================== */
.nfc-list{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.empty{
  text-align:center;
  padding:40px 0;
  color:var(--muted);
}

/* ===================================================== */
</style>
</head>

<body>

<div class="topbar">
  <span class="brand">ESP32 · Monitor</span>

  <div class="topbar-r">
    <a href="index.html" class="nav-a active">Usuario</a>
    <a href="admin.html" class="nav-a">Admin</a>

    <div class="pill">
      <div class="dot wait" id="dot"></div>
      <span id="stxt">Conectando</span>
    </div>
  </div>
</div>

<div class="page">

  <div class="sec-title">Sensores</div>

  <div class="row row-2">

    <!-- 🌡️ TEMPERATURA -->
    <div class="card" id="card-temp">
      <div class="lbl">Temperatura</div>
      <span class="big" id="val-temp">--</span><span class="unit">°C</span>
      <canvas id="chart-temp"></canvas>
    </div>

    <!-- 🔋 BATERÍA -->
    <div class="card" id="card-bat">
      <div class="lbl">Batería ESP32</div>

      <div class="bat-wrap">
        <div class="bat-pct" id="val-bat">--%</div>
      </div>

      <div class="bat-bar-bg">
        <div class="bat-bar" id="bat-bar" style="width:0%"></div>
      </div>
    </div>

  </div>

  <!-- 📡 NFC -->
  <div class="sec-title">Accesos NFC</div>

  <div class="nfc-list" id="nfc-list">
    <div class="empty">
      Esperando lecturas NFC…
    </div>
  </div>

</div>

<script src="config.js"></script>
<script src="user.js"></script>

</body>
</html>
```
